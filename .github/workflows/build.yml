name: Build

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Poetry
        run: pipx install poetry

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: poetry

      - name: Install dependencies
        run: poetry install

      - name: Run tests
        run: poetry run pytest

      - name: Build executable
        run: poetry run build-exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: croquis-windows
          path: dist/croquis.exe
          retention-days: 30

      - name: Update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          prerelease: true
          body: Automatically built from the latest commit on main (${{ github.sha }}).
          files: dist/croquis.exe
